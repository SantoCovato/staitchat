<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>STAIT P2P Chat</title>
    <style>
        body { font-family: sans-serif; display: flex; height: 95vh; margin: 10px; }
        #sidebar { width: 30%; border-right: 2px solid #ccc; padding: 10px; }
        #chat-area { width: 70%; padding: 10px; display: flex; flex-direction: column; }
        #messages { flex-grow: 1; border: 1px solid #ddd; overflow-y: scroll; padding: 10px; margin-bottom: 10px; background: #f9f9f9; }
        .msg { margin: 5px 0; padding: 5px; border-radius: 5px; }
        .io { text-align: right; color: blue; }
        .lui { text-align: left; color: green; }
        .contatto { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        .contatto:hover { background: #eee; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>Il tuo ID: <span id="my-id">...</span></h3>
    <input type="text" id="target-id" placeholder="ID amico">
    <button onclick="aggiungiContatto()">Aggiungi</button>
    <div id="lista-contatti"></div>
</div>

<div id="chat-area">
    <h3 id="chat-title">Seleziona una chat</h3>
    <div id="messages"></div>
    <div>
        <input type="text" id="msg-input" placeholder="Messaggio..." style="width: 80%;">
        <button onclick="invia()">Invia</button>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="app.js"></script>
</body>
</html>
