<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StaitChat — Ghost Protocol</title>
    <!-- PeerJS per connessioni WebRTC P2P dirette -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <!-- QRCode.js per la generazione di QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-pure: #050505;
            --bg-panel: #0d0d0d;
            --bg-item: #141414;
            --border-dark: #1a1a1a;
            --neon-blue: #0077ff;
            --text-main: #ffffff;
            --text-muted: #666666;
            --system-msg: #ffcc00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-pure);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #setup-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--bg-pure);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .setup-card {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-dark);
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            max-width: 420px;
            width: 100%;
        }

        .brand-title {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .brand-title span {
            color: var(--neon-blue);
        }

        .setup-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .btn-neon {
            background-color: transparent;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            padding: 14px 28px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            width: 100%;
            text-transform: uppercase;
        }

        .btn-neon:hover {
            background-color: var(--neon-blue);
            color: var(--text-main);
            box-shadow: 0 0 15px rgba(0, 119, 255, 0.4);
        }

        #app-screen {
            display: none;
            width: 100%;
            height: 100%;
        }

        #sidebar {
            width: 340px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border-dark);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border-dark);
        }

        .my-identity-box {
            background-color: var(--bg-pure);
            border: 1px solid var(--border-dark);
            padding: 16px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        #qrcode {
            padding: 8px;
            background: #ffffff;
            border-radius: 6px;
            display: inline-block;
        }

        #qrcode img {
            display: block;
        }

        .id-text-wrapper {
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            color: var(--text-muted);
            word-break: break-all;
            text-align: center;
            background: #000;
            padding: 6px;
            border-radius: 4px;
            width: 100%;
            cursor: pointer;
        }

        .id-text-wrapper:hover {
            color: var(--neon-blue);
        }

        .sidebar-action {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-dark);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar-action input {
            background-color: var(--bg-pure);
            border: 1px solid var(--border-dark);
            padding: 10px;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 12px;
            width: 100%;
            transition: border 0.2s ease;
        }

        .sidebar-action input:focus {
            outline: none;
            border-color: var(--neon-blue);
        }

        .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 14px 12px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 4px;
            transition: background 0.15s ease;
        }

        .contact-item:hover {
            background-color: var(--bg-item);
        }

        .contact-item.active {
            background-color: var(--bg-item);
            border-left: 3px solid var(--neon-blue);
        }

        .avatar-shadow {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #1a1a1a;
            margin-right: 12px;
            border: 1px solid var(--border-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 12px;
        }

        .contact-info {
            flex: 1;
        }

        .contact-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
            word-break: break-all;
        }

        .contact-status {
            font-size: 11px;
            color: var(--neon-blue);
        }

        .contact-status.offline {
            color: var(--text-muted);
        }

        #chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-pure);
        }

        .chat-header {
            padding: 20px 24px;
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border-dark);
            display: flex;
            align-items: center;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.sent { justify-content: flex-end; }
        .message-row.received { justify-content: flex-start; }
        .message-row.system { justify-content: center; }

        .bubble {
            max-width: 65%;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.45;
            word-break: break-word;
        }

        .message-row.sent .bubble {
            background-color: var(--bg-item);
            color: var(--text-main);
            border: 1px solid var(--border-dark);
            border-bottom-right-radius: 2px;
        }

        .message-row.received .bubble {
            background-color: var(--bg-panel);
            color: var(--text-main);
            border: 1px solid var(--border-dark);
            border-bottom-left-radius: 2px;
        }

        .message-row.system .bubble {
            background-color: transparent;
            color: var(--system-msg);
            font-size: 12px;
            font-family: monospace;
            text-align: center;
            max-width: 90%;
            padding: 4px;
        }

        .input-bar {
            padding: 20px 24px;
            background-color: var(--bg-panel);
            border-top: 1px solid var(--border-dark);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-bar input {
            flex: 1;
            background-color: var(--bg-pure);
            border: 1px solid var(--border-dark);
            padding: 14px 18px;
            border-radius: 10px;
            color: var(--text-main);
            font-size: 14px;
            transition: border 0.2s ease;
        }

        .input-bar input:focus {
            outline: none;
            border-color: var(--neon-blue);
        }

        .btn-send {
            background: var(--bg-item);
            border: 1px solid var(--border-dark);
            color: var(--neon-blue);
            width: 48px;
            height: 48px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .btn-send:hover {
            background: var(--neon-blue);
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <!-- 1. SETUP SCREEN -->
    <div id="setup-screen">
        <div class="setup-card">
            <div class="brand-title">STAIT<span>CHAT</span></div>
            <div class="setup-subtitle">Protocollo WebRTC P2P Reale. Cifratura End-to-End nativa. Nessun server centrale.</div>
            <button class="btn-neon" onclick="inizializzaGenerazione()">Inizializza Chiavi e Rete</button>
        </div>
    </div>

    <!-- 2. MAIN APP SCREEN -->
    <div id="app-screen">
        
        <!-- Sidebar -->
        <div id="sidebar">
            <div class="sidebar-header">
                <div class="my-identity-box">
                    <div id="qrcode"></div>
                    <div class="id-text-wrapper" id="my-id-text" onclick="copiaIlMioID()" title="Clicca per copiare">Generazione ID...</div>
                </div>
            </div>
            
            <!-- Zona Input integrata per evitare blocchi del browser desktop -->
            <div class="sidebar-action">
                <input type="text" id="peer-target-input" placeholder="Incolla lo STAIT_ID del peer...">
                <button class="btn-neon" style="padding: 10px; font-size: 12px;" onclick="connettiAPeer()">Connetti a Peer</button>
            </div>

            <div class="contacts-list" id="contacts-container">
                <!-- I contatti reali appariranno qui -->
            </div>
        </div>

        <!-- Chat Area -->
        <div id="chat-area">
            <div class="chat-header">
                <div>
                    <h4 id="chat-with-title" style="font-size: 16px; font-weight: 600; color: var(--text-muted);">Nessun Peer Connesso</h4>
                    <span id="chat-status-text" style="font-size: 12px; color: var(--text-muted);">In attesa di connessione diretta...</span>
                </div>
            </div>
            
            <div class="messages-container" id="messages-box">
                <div class="message-row system">
                    <div class="bubble">[SISTEMA] Condividi il tuo ID con un amico o inserisci il suo per aprire il canale diretto asimmetrico.</div>
                </div>
            </div>

            <div class="input-bar">
                <input type="text" id="message-input" placeholder="Seleziona un peer o connettiti prima di scrivere..." disabled>
                <button class="btn-send" id="send-btn" onclick="inviaMessaggioReale()" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
