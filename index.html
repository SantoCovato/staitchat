<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAIT Chat</title>
    <style>
        :root { --bg-dark: #0b141a; --panel-dark: #111b21; --msg-io: #005c4b; --msg-lui: #202c33; --text-main: #e9edef; --accent: #00a884; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; background-color: var(--bg-dark); color: var(--text-main); overflow: hidden; }

        #sidebar { width: 300px; background: var(--panel-dark); border-right: 1px solid #2a3942; display: flex; flex-direction: column; position: relative; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #2a3942; font-weight: bold; }
        #lista-contatti { overflow-y: auto; flex-grow: 1; }
        .contatto { padding: 15px; border-bottom: 1px solid #202c33; cursor: pointer; }
        .contatto:hover { background: #2a3942; }

        .fab { position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; border-radius: 50%; background: var(--accent); color: white; border: none; font-size: 30px; cursor: pointer; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #fab-menu { position: fixed; bottom: 85px; right: 20px; background: var(--panel-dark); border: 1px solid #2a3942; border-radius: 8px; width: 220px; z-index: 99; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .menu-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #2a3942; }
        .menu-item:hover { background: #2a3942; }
        .hidden { display: none !important; }

        #chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #0b141a; }
        .chat-header { display: flex; align-items: center; background: var(--panel-dark); padding: 10px; }
        #back-btn { display: none; background: none; border: none; color: white; font-size: 24px; padding: 0 15px; }
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 70%; font-size: 0.9rem; }
        .io { align-self: flex-end; background: var(--msg-io); }
        .lui { align-self: flex-start; background: var(--msg-lui); }

        .input-zone { padding: 15px; background: var(--panel-dark); display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 12px; border-radius: 8px; background: #2a3942; border: none; color: white; }
        button.send-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }

        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display:flex; justify-content:center; align-items:center; z-index: 1000; }
        .modal-content { background: var(--panel-dark); padding: 25px; border-radius: 10px; text-align: center; width: 80%; max-width: 300px; }
        .modal-content input { width: 100%; margin-bottom: 15px; box-sizing: border-box; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; }
            #chat-area { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 100; }
            #chat-area.active { display: flex; }
            #back-btn { display: block; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">STAIT Chat</div>
    <div id="lista-contatti"></div>
    <button class="fab" onclick="toggleMenu()">+</button>
    <div id="fab-menu" class="hidden">
        <div class="menu-item" onclick="mostraQR()">📷 Il mio ID / QR</div>
        <div class="menu-item" onclick="promptAggiungi()">➕ Aggiungi contatto</div>
    </div>
</div>

<div id="chat-area">
    <div class="chat-header">
        <button id="back-btn" onclick="chiudiChat()">←</button>
        <h3 id="chat-title" style="margin:0; padding-left:10px;">Seleziona una chat</h3>
    </div>
    <div id="messages"></div>
    <div class="input-zone">
        <input type="text" id="msg-input" placeholder="Messaggio...">
        <button class="send-btn" onclick="invia()">Invia</button>
    </div>
</div>

<!-- Modal QR -->
<div id="qr-modal" class="modal hidden">
    <div class="modal-content">
        <div id="qrcode"></div>
        <p style="margin-top:15px;">ID: <strong id="my-id">...</strong></p>
        <button onclick="document.getElementById('qr-modal').classList.add('hidden')">Chiudi</button>
    </div>
</div>

<!-- Modal Aggiungi -->
<div id="add-modal" class="modal hidden">
    <div class="modal-content">
        <h3>Nuovo Contatto</h3>
        <input type="text" id="target-id-input" placeholder="ID dell'amico...">
        <div style="display:flex; gap: 10px; justify-content: center;">
            <button onclick="document.getElementById('add-modal').classList.add('hidden')">Annulla</button>
            <button onclick="confermaAggiungi()" style="background: var(--accent); color:white; border:none; padding:10px;">Aggiungi</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="app.js"></script>
</body>
</html>
