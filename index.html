<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAIT Chat</title>
    <style>
        :root {
            --bg-dark: #0b141a;
            --panel-dark: #111b21;
            --msg-io: #005c4b;
            --msg-lui: #202c33;
            --text-main: #e9edef;
            --accent: #00a884;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; background-color: var(--bg-dark); color: var(--text-main); overflow: hidden; }

        /* Sidebar */
        #sidebar { width: 300px; background: var(--panel-dark); border-right: 1px solid #2a3942; display: flex; flex-direction: column; z-index: 10; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--panel-dark); border-bottom: 1px solid #2a3942; }
        .header-actions button { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-main); }
        
        #add-panel, #qr-panel { padding: 15px; background: #202c33; border-bottom: 1px solid #2a3942; }
        #qrcode { background: white; padding: 10px; display: inline-block; border-radius: 5px; margin-top: 10px; }

        #lista-contatti { overflow-y: auto; flex-grow: 1; }
        .contatto { padding: 15px; border-bottom: 1px solid #202c33; cursor: pointer; transition: 0.2s; }
        .contatto:hover { background: #2a3942; }

        /* Chat Area */
        #chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #0b141a; }
        .chat-header { display: flex; align-items: center; background: var(--panel-dark); padding: 10px; }
        #back-btn { display: none; background: none; border: none; color: white; font-size: 24px; padding: 0 15px; cursor: pointer; }
        
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 70%; position: relative; font-size: 0.9rem; }
        .io { align-self: flex-end; background: var(--msg-io); color: white; }
        .lui { align-self: flex-start; background: var(--msg-lui); color: white; }

        .input-zone { padding: 15px; background: var(--panel-dark); display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 12px; border-radius: 8px; border: none; background: #2a3942; color: white; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; }
            #chat-area { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 100; }
            #chat-area.active { display: flex; }
            #back-btn { display: block; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <strong>STAIT Chat</strong>
        <div class="header-actions">
            <button onclick="togglePanel('qr-panel')">📷</button>
            <button onclick="togglePanel('add-panel')">➕</button>
        </div>
    </div>

    <div id="add-panel" style="display:none;">
        <input type="text" id="target-id" placeholder="ID amico...">
        <button onclick="aggiungiContatto()" style="width:100%; margin-top:10px;">Aggiungi</button>
    </div>

    <div id="qr-panel" style="display:none; text-align:center;">
        <div id="qrcode"></div>
        <p style="font-size: 0.8rem; margin-top:10px;">Il mio ID: <span id="my-id">...</span></p>
    </div>

    <div id="lista-contatti"></div>
</div>

<div id="chat-area">
    <div class="chat-header">
        <button id="back-btn" onclick="chiudiChat()">←</button>
        <h3 id="chat-title" style="margin:0;">Seleziona una chat</h3>
    </div>
    <div id="messages"></div>
    <div class="input-zone">
        <input type="text" id="msg-input" placeholder="Messaggio...">
        <button onclick="invia()">Invia</button>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="app.js"></script>
</body>
</html>
